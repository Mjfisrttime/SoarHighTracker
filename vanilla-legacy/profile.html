<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Company Tracker</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-layout">
        <!-- Sidebar placeholder -->
        <div id="sidebar-container"></div>
        
        <main class="dashboard-content">
            <!-- Navbar placeholder -->
            <div id="navbar-container"></div>
            
            <div class="page-header">
                <h1>My Profile</h1>
            </div>
            
            <div class="cards-grid" style="grid-template-columns: 1fr; max-width: 800px; margin: 0 auto;">
                
                <!-- Account Information -->
                <div class="card">
                    <h3>Account Details</h3>
                    <div style="display: flex; gap: 40px; margin-top: 20px;">
                        <div>
                            <p style="color: var(--text-light); font-size: 0.85rem; margin-bottom: 4px;">Email Address</p>
                            <p id="profile-email" style="font-weight: 500;">Loading...</p>
                        </div>
                        <div>
                            <p style="color: var(--text-light); font-size: 0.85rem; margin-bottom: 4px;">Account Role</p>
                            <p id="profile-role" style="font-weight: 500;">Loading...</p>
                        </div>
                        <div>
                            <p style="color: var(--text-light); font-size: 0.85rem; margin-bottom: 4px;">Join Date</p>
                            <p id="profile-joined" style="font-weight: 500;">Loading...</p>
                        </div>
                    </div>
                </div>

                <!-- Update Name Form -->
                <div class="card">
                    <h3>Update Profile</h3>
                    <p style="color: var(--text-light); font-size: 0.9rem; margin-bottom: 20px;">Update your display name.</p>
                    
                    <form id="form-update-name">
                        <div class="form-group" style="max-width: 400px;">
                            <label for="profile-name">Full Name</label>
                            <input type="text" id="profile-name" required>
                        </div>
                        <button type="submit" class="btn-primary" id="btn-save-name">Save Changes</button>
                    </form>
                </div>

                <!-- Update Password Form -->
                <div class="card" style="border-top: 4px solid var(--danger);">
                    <h3 style="color: var(--danger);">Security</h3>
                    <p style="color: var(--text-light); font-size: 0.9rem; margin-bottom: 20px;">Change your account password.</p>
                    
                    <form id="form-change-password">
                        <div class="form-group" style="max-width: 400px;">
                            <label for="new-password">New Password</label>
                            <input type="password" id="new-password" required minlength="6">
                        </div>
                        <div class="form-group" style="max-width: 400px;">
                            <label for="confirm-password">Confirm Password</label>
                            <input type="password" id="confirm-password" required minlength="6">
                        </div>
                        <button type="submit" class="btn-danger" id="btn-save-password">Update Password</button>
                    </form>
                </div>

            </div>
            
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
