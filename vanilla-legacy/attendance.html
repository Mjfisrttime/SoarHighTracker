<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance - Company Tracker</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/attendance.css">
</head>
<body>
    <div class="dashboard-layout">
        <!-- Sidebar placeholder -->
        <div id="sidebar-container"></div>
        
        <main class="dashboard-content">
            <!-- Navbar placeholder -->
            <div id="navbar-container"></div>
            
            <div class="page-header">
                <h1>Attendance</h1>
            </div>
            
            <!-- ADMIN VIEW -->
            <div id="admin-attendance-view" class="hidden">
                <div class="controls-bar row-flex">
                    <div class="form-group flex-1">
                        <label>Select Group:</label>
                        <select id="admin-group-select">
                            <option value="">Select...</option>
                        </select>
                    </div>
                    <div class="form-group flex-1">
                        <label>Date:</label>
                        <input type="date" id="admin-date-picker">
                    </div>
                    <div class="form-group flex-1 flex-end">
                        <button class="btn-primary" id="btn-save-attendance">Save Records</button>
                    </div>
                </div>

                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="admin-attendance-list">
                            <tr>
                                <td colspan="2">Select a group to load members.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- MEMBER VIEW -->
            <div id="member-attendance-view" class="hidden">
                <div class="cards-grid" id="member-summary-cards">
                    <div class="card stat-present">
                        <h3>Present</h3>
                        <p class="card-value" id="count-present">0</p>
                    </div>
                    <div class="card stat-absent">
                        <h3>Absent</h3>
                        <p class="card-value" id="count-absent">0</p>
                    </div>
                    <div class="card stat-late">
                        <h3>Late</h3>
                        <p class="card-value" id="count-late">0</p>
                    </div>
                </div>

                <h2>Recent History</h2>
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="member-recent-logs">
                            <tr>
                                <td colspan="2">Loading...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/attendance.js"></script>
</body>
</html>
