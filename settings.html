<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Company Tracker</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-layout">
        <!-- Sidebar placeholder -->
        <div id="sidebar-container"></div>
        
        <main class="dashboard-content">
            <!-- Navbar placeholder -->
            <div id="navbar-container"></div>
            
            <div class="page-header">
                <h1>Settings</h1>
            </div>
            
            <div class="cards-grid" style="grid-template-columns: 1fr; max-width: 600px; margin: 0 auto;">
                
                <!-- Account Section -->
                <div class="card">
                    <h3>Account</h3>
                    <p style="color: var(--text-light); font-size: 0.9rem; margin-bottom: 20px;">Manage your profile and security credentials.</p>
                    <a href="profile.html" class="btn-secondary" style="display: inline-block; text-align: center; text-decoration: none;">Go to Profile Settings</a>
                </div>

                <!-- Appearance Section -->
                <div class="card">
                    <h3>Appearance</h3>
                    <p style="color: var(--text-light); font-size: 0.9rem; margin-bottom: 20px;">Customize the interface of the application.</p>
                    
                    <div style="display: flex; align-items: center; justify-content: space-between; padding: 12px; background: var(--background-color); border-radius: 8px;">
                        <div>
                            <strong>Dark Mode</strong>
                            <p style="font-size: 0.8rem; color: var(--text-light); margin: 0;">Switch to a darker theme.</p>
                        </div>
                        <button id="btn-toggle-theme" class="btn-primary">Enable Dark Mode</button>
                    </div>
                </div>

                <!-- System & Logout Section -->
                <div class="card" style="border-top: 4px solid var(--danger);">
                    <h3 style="color: var(--danger);">System</h3>
                    
                    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; padding-top: 16px;">
                        <span style="font-weight: 500;">App Version</span>
                        <span style="color: var(--text-light);">v1.0.0-MVP</span>
                    </div>

                    <button id="btn-logout" class="btn-danger" style="width: 100%;">Sign Out of Application</button>
                </div>

            </div>
            
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/settings.js"></script>
</body>
</html>
